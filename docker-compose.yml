version: '3.8'

services:
  aegis-passport:
    build: .
    image: aegis_passport_local
    container_name: aegis_passport_local
    restart: unless-stopped
    volumes:
      # Maps local vault directory to the non-root user's home directory
      - ~/.ai-passport:/home/aegisuser/.ai-passport
    environment:
      - LOCAL_VAULT_PATH=/home/aegisuser/.ai-passport
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
    ports:
      - "8080:8080"