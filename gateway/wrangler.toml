name = "aegis-mcp-bridge"
main = "src/index.ts"
compatibility_date = "2025-05-22"
compatibility_flags = ["nodejs_compat"]

# Worker secrets — set via `wrangler secret put`:
#   wrangler secret put IRONCLAW_AGENT_API_KEY
#   wrangler secret put IRONCLAW_AGENT_BASE_URL

[vars]
# Non-sensitive defaults (overridden by secrets in production).
# IRONCLAW_AGENT_BASE_URL defaults to the production Shade Agent enclave endpoint.
# Override locally with: wrangler dev --var IRONCLAW_AGENT_BASE_URL:http://localhost:8080
IRONCLAW_AGENT_BASE_URL = "https://api.aipassports.xyz"

[[rules]]
type = "ESModule"
globs = ["**/*.ts"]

[[kv_namespaces]]
binding = "CHALLENGES_KV"
id = "ab73bb8bd9a3486db0d713c3a8c7ad1b"

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "1905df2470e04bceb31a2da1414aca5b"
